<!DOCTYPE html>
<html>
<head>
    <title>AI Secure Log Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            margin-right: 10px;
        }

        #result, #highlightedLog {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }

        h2 { font-size: 28px; }
        h3 { margin-top: 20px; }
    </style>
</head>

<body>

<h2>🔐 AI Secure Log Analyzer</h2>

<!-- TEXT INPUT -->
<h3>Paste Logs</h3>
<textarea id="logInput" placeholder="Paste system logs here (email, password, api_key)..."></textarea>

<button onclick="analyze()">Analyze Text</button>

<!-- FILE UPLOAD -->
<h3>Upload File</h3>
<input type="file" id="fileInput" />
<br><br>
<button onclick="analyzeFile()">Analyze File</button>

<!-- HIGHLIGHT -->
<h3>Processed Log (Highlighted)</h3>
<div id="highlightedLog"></div>

<!-- RESULT -->
<div id="result"></div>

<script>

    function renderResult(data) {

        let output = "";

        output += `<h2>Summary</h2><p>${data.summary}</p>`;

        output += `<h3>Risk Level: <span style="color:${
            data.riskLevel === "HIGH" ? "red" :
            data.riskLevel === "MEDIUM" ? "orange" : "green"
        }">${data.riskLevel}</span></h3>`;

        output += `<h3>Risk Score: ${data.riskScore}</h3>`;

        output += `<h2 style="color:red">🚨 ACTION: ${data.action}</h2>`;

        output += "<h3>Insights</h3><ul>";
        data.insights.forEach(i => {
            output += `<li>${i}</li>`;
        });
        output += "</ul>";

        output += "<h3>Findings</h3>";
        data.findings.forEach(f => {
            output += `
                <div style="border:1px solid #444; padding:10px; margin:5px; border-radius:5px;">
                    <b>Type:</b> ${f.type} <br>
                    <b>Risk:</b> <span style="color:${
                        f.risk === "critical" ? "red" :
                        f.risk === "high" ? "orange" : "green"
                    }">${f.risk}</span><br>
                    <b>Value:</b> ${f.value}<br>
                    <b>Line:</b> ${f.line}
                </div>
            `;
        });

        output += `<p><small>${data.timestamp}</small></p>`;

        document.getElementById("result").innerHTML = output;
    }


    function analyze() {

        const content = document.getElementById("logInput").value;

        if (!content.trim()) {
            alert("Please enter logs");
            return;
        }

        fetch("/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: content
            })
        })
        .then(res => res.json())
        .then(data => {

            // Highlight logic
            let highlighted = content;

            data.findings.forEach(f => {
                let clean = f.value.replace(/\*/g, "");
                if (clean.length > 2) {
                    highlighted = highlighted.replace(
                        clean,
                        `<span style="background:red;color:white;">${clean}</span>`
                    );
                }
            });

            document.getElementById("highlightedLog").innerHTML = highlighted;

            renderResult(data);
        })
        .catch(err => {
            document.getElementById("result").innerHTML =
                `<span style="color:red;">Error: ${err}</span>`;
        });
    }


    function analyzeFile() {

        const file = document.getElementById("fileInput").files[0];

        if (!file) {
            alert("Please select a file");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        fetch("/api/analyze/file", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("highlightedLog").innerHTML =
    `<span style="color:orange;">
        File analyzed successfully. Highlight available only for direct log input.
     </span>`;

            renderResult(data);
        })
        .catch(err => {
            document.getElementById("result").innerHTML =
                `<span style="color:red;">Error: ${err}</span>`;
        });
    }

</script>

</body>
</html>
